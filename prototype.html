function resize() {
  const vw = window.innerWidth, vh = window.innerHeight
  const scale = Math.min(vw / W, vh / H)
  canvas.width = W
  canvas.height = H
  canvas.style.width  = Math.floor(W * scale) + 'px'
  canvas.style.height = Math.floor(H * scale) + 'px'
}

function drawText(text, x, y, color, scale=1, align='left') {
  const charW = (5+1)*scale
  const totalW = text.length * charW - scale
  let sx = align==='center' ? x - totalW/2 : align==='right' ? x - totalW : x
  ctx.fillStyle = color
  for (const ch of text) {
    const bitmap = FONT[ch] ?? FONT[' ']
    for (let col = 0; col < 5; col++) {
      const bits = bitmap[col]
      for (let row = 0; row < 7; row++) {
        if (bits & (1 << row)) ctx.fillRect(Math.floor(sx+col*scale), Math.floor(y+row*scale), scale, scale)
      }
    }
    sx += charW
  }
}

function textWidth(text, scale=1) { return text.length*(5+1)*scale - scale }

function roundRect(x,y,w,h,r) {
  ctx.beginPath()
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r)
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h)
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r)
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y)
  ctx.closePath()
}

// ─── Layout ───────────────────────────────────────────────────────────────────
const HEADER_H  = 130
const TAB_H     = 36
const CONTENT_Y = HEADER_H + TAB_H
const CONTENT_H = H - CONTENT_Y - 20

// ─── State ────────────────────────────────────────────────────────────────────
let S = null

function initState(saved={}) {
  return Object.assign({
    covers:0, totalCovers:0, coversPerSec:0,
    owned:{}, upgrades:new Set(), regulars:new Set(),
    prestige:0, prestigeConfirm:false, coversAtPrestige:0,
    stars:0, totalStars:0, starUpgrades:new Set(),
    ledgerUnlocked:new Set(), ledgerReading:null, ledgerPage:0, ledgerLastTap:0,
    tab:'stations', scrollY:0, scrollTarget:0,
    toasts:[], particles:[], steam:[],
    clickAnim:0, lastTick:performance.now(), era:0,
    notif:'', notifLife:0,
    newRegular:null, newRegularLife:0,
    showOfflineScreen:false, offlineEarned:0,
    showMarcus:false,
    showDevScreen:false,
  }, saved)
}

// ─── Save / Load ──────────────────────────────────────────────────────────────
const SAVE_KEY = 'evoche_v1'

function saveGame() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      covers: S.covers, totalCovers: S.totalCovers,
      owned: S.owned,
      upgrades: [...S.upgrades], regulars: [...S.regulars],
      prestige: S.prestige, coversAtPrestige: S.coversAtPrestige, era: S.era,
      stars: S.stars, totalStars: S.totalStars,
      starUpgrades: [...S.starUpgrades],
      ledgerUnlocked: [...S.ledgerUnlocked],
      savedAt: Date.now(),
    }))
  } catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY)
    if (!raw) return {}
    const d = JSON.parse(raw)
    return {
      covers: d.covers??0, totalCovers: d.totalCovers??0,
      owned: d.owned??{},
      upgrades: new Set(d.upgrades??[]), regulars: new Set(d.regulars??[]),
      prestige: d.prestige??0, coversAtPrestige: d.coversAtPrestige??0, era: d.era??0,
      stars: d.stars??0, totalStars: d.totalStars??0,
      starUpgrades: new Set(d.starUpgrades??[]),
      ledgerUnlocked: new Set(d.ledgerUnlocked??[]),
    }
  } catch(e) { return {} }
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function getShift() {
  const h = new Date().getHours()
  return SHIFTS.find(s => {
    const [a,b] = s.hours
    return a<b ? (h>=a && h<b) : (h>=a || h<b)
  }) ?? SHIFTS[0]
}

function stationCost(def, owned) {
  return Math.floor(def.baseCost * Math.pow(def.costMult, owned))
}

function getMultiplier(stationId) {
  let m = 1
  for (const uid of S.upgrades) {
    const u = UPGRADES.find(x=>x.id===uid)
    if (u && u.stationId===stationId) m *= u.multiplier
  }
  for (const rid of S.regulars) {
    const r = REGULARS.find(x=>x.id===rid)
    if (r) m += r.multiplier(S.owned)
  }
  const shift = getShift()
  if (shift.boostStation===stationId) m *= shift.boostMult
  let prestigeBonus = S.prestige * 0.1
  if (S.starUpgrades.has('s_prestige2x')) prestigeBonus *= 2
  if (S.prestige>0 && S.regulars.has('pascal')) m *= 1 + prestigeBonus
  if (S.regulars.has('lena') && getShift().name==='late') m *= 2
  if (S.starUpgrades.has('s_ghostshift') && stationId==='ghost') m *= 2
  if (S.starUpgrades.has('s_cellarboost') && (stationId==='cellar'||stationId==='backroom')) m *= 2
  return m
}

function checkLedger() {
  for (const entry of LEDGER) {
    if (S.ledgerUnlocked.has(entry.id)) continue
    let triggered = false
    if (entry.triggerCovers !== undefined && S.totalCovers >= entry.triggerCovers) triggered = true
    if (entry.triggerPrestige !== undefined && S.prestige >= entry.triggerPrestige) triggered = true
    if (triggered) {
      S.ledgerUnlocked.add(entry.id)
      S.stars += entry.starReward
      S.totalStars += entry.starReward
      setNotif('New ledger entry: ' + entry.title + ' (+'+ entry.starReward +' star' + (entry.starReward>1?'s':'') + ')')
      spawnParticles(W-40, 20, '#ffe066', 12)
    }
  }
}

function calcCPS() {
  let total = 0
  for (const def of STATIONS) {
    const n = S.owned[def.id]??0
    if (n===0) continue
    total += def.baseRate * n * getMultiplier(def.id)
  }
  return total
}

function clickBonus() {
  let base = 1 + Math.floor(calcCPS() * 0.01)
  if (S.regulars.has('mireille')) base += 1
  if (S.starUpgrades.has('s_clickgold')) base *= 3
  return Math.max(1, base)
}

function prestigeThreshold(p) { return 100000 * Math.pow(5, p) }

function formatNum(n) {
  if (n<1000) return Math.floor(n).toString()
  if (n<1e6)  return (n/1000).toFixed(1)+'k'
  if (n<1e9)  return (n/1e6).toFixed(2)+'M'
  if (n<1e12) return (n/1e9).toFixed(2)+'B'
  return (n/1e12).toFixed(2)+'T'
}

function wrapText(text, maxChars) {
  const words = text.split(' ')
  const lines = []; let cur = ''
  for (const w of words) {
    if (cur.length+w.length+1 > maxChars) { lines.push(cur.trim()); cur='' }
    cur += w+' '
  }
  if (cur.trim()) lines.push(cur.trim())
  return lines
}

function pal() { return Object.assign({}, P, ERAS[S.era].palette) }

function spawnParticles(x,y,color,n=6) {
  for (let i=0;i<n;i++) {
    const a = Math.random()*Math.PI*2, sp = 1+Math.random()*3
    S.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:30+Math.random()*20,color,size:2+Math.random()*2})
  }
}

function addToast(text,x,y,color,scale=1) {
  S.toasts.push({text,x,y,life:50,maxLife:50,color,scale})
}

function setNotif(text) { S.notif=text; S.notifLife=180 }

function checkUnlocks() {
  for (const r of REGULARS) {
    if (!S.regulars.has(r.id) && S.totalCovers >= r.unlockCoversTotal) {
      S.regulars.add(r.id)
      S.newRegular = r; S.newRegularLife = 300
    }
  }
  checkLedger()
}

  for (let px=-4;px<=4;px++) for (let py=-5;py<=4;py++) {
    const onEdge=Math.abs(px)===4||Math.abs(py)===5||(py===4&&Math.abs(px)<=3)
    const isEye=(py===-2&&(px===-2||px===2))
    const isMouth=py===2&&Math.abs(px)<=2&&!(px===0)
    if ((Math.abs(px)<=3&&Math.abs(py)<=4)&&!onEdge) {
      ctx.fillStyle=isEye?(color===P.gold?'#f5e6c8':color):(color+'44')
      ctx.fillRect(cx+px*2,cy+py*2,2,2)
    }
    if (isEye||isMouth) { ctx.fillStyle=color; ctx.fillRect(cx+px*2,cy+py*2,2,2) }
  }
}

// ─── Draw functions ───────────────────────────────────────────────────────────
function draw(now) {
  const p = pal()
  const shift = getShift()

  ctx.fillStyle=p.bg; ctx.fillRect(0,0,W,H)
  ctx.save(); ctx.globalAlpha=0.025
  for (let i=0;i<80;i++) {
    ctx.fillStyle=Math.random()>0.5?'#fff':'#000'
    ctx.fillRect(Math.random()*W,Math.random()*H,1,1)
  }
  ctx.restore()

  drawHeader(p, shift, now)
  drawTabBar(p, shift)
  drawContent(p, now)
  drawSteamLayer()
  drawParticles()
  drawToasts()
  if (S.notifLife>0) drawNotif(p)
  if (S.newRegular && S.newRegularLife>0) drawRegularPopup(p)
  if (S.prestigeConfirm) drawPrestigeConfirm(p)
  if (S.showOfflineScreen) drawOfflineScreen(p)
  if (S.showMarcus) drawMarcusFullscreen()
  if (S.showDevScreen) drawDevScreen(p)
}

function drawHeader(p, shift, now) {
  const hg=ctx.createLinearGradient(0,0,0,HEADER_H)
  hg.addColorStop(0,p.panelBright); hg.addColorStop(1,p.panel)
  ctx.fillStyle=hg; ctx.fillRect(0,0,W,HEADER_H)
  ctx.fillStyle=p.border; ctx.fillRect(0,HEADER_H-1,W,1)

  const era=ERAS[S.era]
  drawText(era.name, W/2, 8, p.gold, 2, 'center')
  drawText(era.subtitle, W/2, 22, p.creamGhost, 1, 'center')

  drawStation('espresso', 148, 75, S.clickAnim)

  const sg=ctx.createLinearGradient(210,28,380,28)
  sg.addColorStop(0,'rgba(0,0,0,0)'); sg.addColorStop(0.3,`${shift.color}22`); sg.addColorStop(1,`${shift.color}22`)
  ctx.fillStyle=sg; ctx.fillRect(210,24,170,18)
  drawText(shift.label, 220, 28, shift.color, 1)
  drawText(shift.boostStation+' boost', 220, 39, p.creamGhost, 1)

  drawText(formatNum(Math.floor(S.covers)), 220, 58, p.cream, 2)
  drawText('COVERS', 220, 74, p.creamDim, 1)
  drawText(formatNum(S.coversPerSec)+'/s', 220, 86, p.gold, 1)
  drawText('total: '+formatNum(S.totalCovers), 220, 98, p.creamGhost, 1)

  const pthr=prestigeThreshold(S.prestige)
  const pReady=S.totalCovers>=pthr
  const pColor=pReady?p.gold:p.creamGhost
  ctx.fillStyle=pReady?`${p.gold}22`:`${p.border}44`
  roundRect(W-72,6,64,26,4); ctx.fill()
  ctx.strokeStyle=pReady?p.gold:p.border; ctx.lineWidth=1
  roundRect(W-72,6,64,26,4); ctx.stroke()
  drawText('PRESTIGE', W-40, 10, pColor, 1, 'center')
  drawText('x'+(S.prestige+1), W-40, 21, pColor, 1, 'center')

  for (let i=0;i<S.prestige;i++) drawText('+', 10+i*10, 8, p.gold, 1)

  // stars display top-left
  if (S.stars > 0 || S.totalStars > 0) {
    drawText('* '+S.stars, 10, 108, '#ffe066', 1)
  }

  // version label bottom-left
  drawText('v1.10.1', 10, 118, p.creamGhost, 1)
  drawText('The Guy added', 52, 118, p.creamGhost, 1)

  // refresh button (⟳) — bottom-right of header
  ctx.fillStyle=p.panel+'cc'
  roundRect(W-52, 108, 22, 15, 3); ctx.fill()
  ctx.strokeStyle=p.border; ctx.lineWidth=1
  roundRect(W-52, 108, 22, 15, 3); ctx.stroke()
  drawText('RLD', W-41, 111, p.creamGhost, 1, 'center')

  // dev button — far bottom-right corner, subtle
  ctx.fillStyle=p.espresso+'cc'
  roundRect(W-26, 108, 20, 15, 3); ctx.fill()
  ctx.strokeStyle=p.border+'88'; ctx.lineWidth=1
  roundRect(W-26, 108, 20, 15, 3); ctx.stroke()
  drawText('DEV', W-16, 111, p.creamGhost, 1, 'center')
}

function drawTabBar(p, shift) {
  ctx.fillStyle=p.espresso; ctx.fillRect(0,HEADER_H,W,TAB_H)
  ctx.fillStyle=p.border; ctx.fillRect(0,HEADER_H+TAB_H-1,W,1)
  const tabs=[{key:'stations',label:'STATIONS'},{key:'upgrades',label:'MENU'},{key:'regulars',label:'GUESTS'},{key:'ledger',label:'LEDGER'}]
  const tabW=W/tabs.length
  for (let i=0;i<tabs.length;i++) {
    const t=tabs[i], active=S.tab===t.key, tx=i*tabW
    if (active) {
      ctx.fillStyle=p.panelBright; ctx.fillRect(tx,HEADER_H,tabW,TAB_H)
      ctx.fillStyle=shift.color; ctx.fillRect(tx,HEADER_H+TAB_H-2,tabW,2)
    }
    drawText(t.label, tx+tabW/2, HEADER_H+13, active?p.cream:p.creamGhost, 1, 'center')
    // dot indicator for new ledger entries
    if (t.key==='ledger') {
      const hasNew = LEDGER.some(e=>S.ledgerUnlocked.has(e.id))
      if (hasNew && !active) {
        ctx.fillStyle='#ffe066'
        ctx.beginPath(); ctx.arc(tx+tabW-8,HEADER_H+8,3,0,Math.PI*2); ctx.fill()
      }
    }
  }
}

function drawContent(p, now) {
  ctx.save()
  ctx.beginPath(); ctx.rect(0,CONTENT_Y,W,CONTENT_H); ctx.clip()
  if (S.tab==='stations') drawStationsTab(p)
  if (S.tab==='upgrades') drawUpgradesTab(p)
  if (S.tab==='regulars') drawRegularsTab(p)
  if (S.tab==='ledger')   drawLedgerTab(p)
  const tf=ctx.createLinearGradient(0,CONTENT_Y,0,CONTENT_Y+18)
  tf.addColorStop(0,p.bg); tf.addColorStop(1,'transparent')
  ctx.fillStyle=tf; ctx.fillRect(0,CONTENT_Y,W,18)
  const bf=ctx.createLinearGradient(0,H-38,0,H-20)
  bf.addColorStop(0,'transparent'); bf.addColorStop(1,p.bg)
  ctx.fillStyle=bf; ctx.fillRect(0,H-38,W,18)
  ctx.restore()
}

function drawStationsTab(p) {
  const rowH=86
  for (let i=0;i<STATIONS.length;i++) {
    const def=STATIONS[i]
    const ry=CONTENT_Y+i*rowH-S.scrollY
    if (ry+rowH<CONTENT_Y||ry>H-20) continue
    const owned=S.owned[def.id]??0
    const locked=S.totalCovers<def.unlockAt
    const cost=stationCost(def,owned)
    const canAfford=S.covers>=cost&&!locked

    ctx.fillStyle=locked?`${p.bg}cc`:(canAfford?`${p.panelBright}cc`:`${p.panel}cc`)
    roundRect(8,ry+4,W-16,rowH-8,6); ctx.fill()
    ctx.strokeStyle=locked?p.border+'44':(canAfford?p.gold+'88':p.border+'88')
    ctx.lineWidth=1; roundRect(8,ry+4,W-16,rowH-8,6); ctx.stroke()

    if (locked) {
      drawText('???', W/2, ry+30, p.creamGhost, 2, 'center')
      drawText('Unlock at '+formatNum(def.unlockAt)+' covers', W/2, ry+52, p.creamGhost, 1, 'center')
      continue
    }

    ctx.save(); if (!canAfford) ctx.globalAlpha=0.55
    drawStation(def.id, 50, ry+rowH/2)
    ctx.restore()

    const cpsC=def.baseRate*owned*getMultiplier(def.id)
    drawText(def.name, 88, ry+14, p.cream, 1)
    drawText(formatNum(cpsC)+'/s', 88, ry+26, p.gold, 1)
    drawText(def.flavor, 88, ry+40, p.creamGhost, 1)

    const costColor=canAfford?p.amber:p.creamGhost
    const costStr=formatNum(cost)
    const pillW=textWidth(costStr,1)+14
    ctx.fillStyle=canAfford?`${p.amber}22`:`${p.espresso}88`
    roundRect(W-pillW-12,ry+rowH-28,pillW,16,4); ctx.fill()
    ctx.strokeStyle=costColor+'88'; ctx.lineWidth=1
    roundRect(W-pillW-12,ry+rowH-28,pillW,16,4); ctx.stroke()
    drawText(costStr, W-pillW/2-12, ry+rowH-24, costColor, 1, 'center')

    if (owned>0) {
      const badge='x'+owned, bw=textWidth(badge,1)+10
      ctx.fillStyle=p.gold+'33'; roundRect(W-bw-12,ry+10,bw,14,3); ctx.fill()
      drawText(badge, W-bw/2-12, ry+13, p.gold, 1, 'center')
    }

    const pct=S.coversPerSec>0?Math.min(1,cpsC/S.coversPerSec):0
    ctx.fillStyle=p.border+'44'; ctx.fillRect(88,ry+54,W-100,3)
    if (pct>0) {
      const bg=ctx.createLinearGradient(88,0,88+(W-100)*pct,0)
      bg.addColorStop(0,p.gold+'88'); bg.addColorStop(1,p.amber+'cc')
      ctx.fillStyle=bg; ctx.fillRect(88,ry+54,(W-100)*pct,3)
    }
  }
}

function drawUpgradesTab(p) {
  const available=UPGRADES.filter(u=>!S.upgrades.has(u.id)&&(S.owned[u.stationId]??0)>=u.unlockOwned)
  const purchased=UPGRADES.filter(u=>S.upgrades.has(u.id))
  const rowH=72
  let y=CONTENT_Y-S.scrollY

  if (available.length===0&&purchased.length===0) {
    drawText('Build stations to', W/2, CONTENT_Y+30, p.creamGhost, 1, 'center')
    drawText('unlock menu upgrades.', W/2, CONTENT_Y+45, p.creamGhost, 1, 'center')
    return
  }

  if (available.length>0) {
    drawText('AVAILABLE', 16, y+10, p.creamDim, 1); y+=24
    for (const u of available) { if (y+rowH>CONTENT_Y&&y<H-20) drawUpgradeRow(u,y,p,false); y+=rowH }
  }
  if (purchased.length>0) {
    y+=8; drawText('ADDED TO MENU', 16, y+10, p.creamGhost, 1); y+=24
    for (const u of purchased) { if (y+rowH>CONTENT_Y&&y<H-20) drawUpgradeRow(u,y,p,true); y+=rowH }
  }
}

function drawUpgradeRow(u,y,p,bought) {
  const canAfford=!bought&&S.covers>=u.cost
  const rowH=72
  ctx.fillStyle=bought?`${p.espresso}88`:(canAfford?`${p.panelBright}cc`:`${p.panel}cc`)
  roundRect(8,y+4,W-16,rowH-8,5); ctx.fill()
  ctx.strokeStyle=bought?p.border+'44':(canAfford?p.gold+'66':p.border+'55')
  ctx.lineWidth=1; roundRect(8,y+4,W-16,rowH-8,5); ctx.stroke()
  if (bought) ctx.globalAlpha=0.5
  ctx.save(); ctx.scale(0.6,0.6); drawStation(u.stationId, 44/0.6, (y+36)/0.6); ctx.restore()
  drawText(u.name, 72, y+14, bought?p.creamGhost:p.cream, 1)
  drawText(u.desc, 72, y+27, p.gold, 1)
  const stDef=STATIONS.find(s=>s.id===u.stationId)
  drawText(stDef.name, 72, y+40, p.creamGhost, 1)
  if (!bought) {
    const costStr=formatNum(u.cost), costColor=canAfford?p.amber:p.creamGhost
    const pillW=textWidth(costStr,1)+14
    ctx.fillStyle=canAfford?`${p.amber}22`:`${p.espresso}88`
    roundRect(W-pillW-12,y+14,pillW,16,4); ctx.fill()
    ctx.strokeStyle=costColor+'88'; ctx.lineWidth=1; roundRect(W-pillW-12,y+14,pillW,16,4); ctx.stroke()
    drawText(costStr, W-pillW/2-12, y+18, costColor, 1, 'center')
  } else {
    drawText('ON MENU', W-60, y+18, p.creamGhost, 1)
  }
  if (bought) ctx.globalAlpha=1
}

function drawRegularsTab(p) {
  const rowH=100; let y=CONTENT_Y-S.scrollY
  for (const r of REGULARS) {
    if (y+rowH>CONTENT_Y&&y<H-20) {
      const unlocked=S.regulars.has(r.id)
      const locked=S.totalCovers<r.unlockCoversTotal
      ctx.fillStyle=unlocked?`${p.panelBright}cc`:`${p.panel}88`
      roundRect(8,y+4,W-16,rowH-8,6); ctx.fill()
      ctx.strokeStyle=unlocked?p.gold+'66':p.border+'44'
      ctx.lineWidth=1; roundRect(8,y+4,W-16,rowH-8,6); ctx.stroke()
      if (locked) {
        drawText('???', W/2, y+30, p.creamGhost, 2, 'center')
        drawText('Arrives after '+formatNum(r.unlockCoversTotal)+' covers', W/2, y+52, p.creamGhost, 1, 'center')
      } else {
        drawPixelFace(36, y+46, unlocked?p.gold:p.creamGhost)
        drawText(r.name, 68, y+14, unlocked?p.cream:p.creamDim, 1)
        drawText(r.title, 68, y+26, unlocked?p.gold:p.creamGhost, 1)
        if (unlocked) {
          const lines=wrapText(r.story,36)
          for (let i=0;i<Math.min(lines.length,2);i++) drawText(lines[i], 68, y+40+i*12, p.creamGhost, 1)
          drawText(r.bonusDesc, W-100, y+14, p.amber, 1)
        } else {
          drawText('Not yet a regular', 68, y+42, p.creamGhost, 1)
        }
      }
    }
    y+=rowH
  }
}

function drawLedgerTab(p) {
  const unlockedEntries = LEDGER.filter(e => S.ledgerUnlocked.has(e.id))
  const lockedCount = LEDGER.length - unlockedEntries.length

  if (S.ledgerReading !== null) {
    drawLedgerReading(p, LEDGER[S.ledgerReading])
    return
  }

  let y = CONTENT_Y - S.scrollY + 16

  if (unlockedEntries.length === 0) {
    drawText('The ledger is empty.', W/2, CONTENT_Y+40, p.creamGhost, 1, 'center')
    drawText('Serve more covers to unlock entries.', W/2, CONTENT_Y+56, p.creamGhost, 1, 'center')
    return
  }

  // header
  drawText('THE LEDGER', W/2, y, p.gold, 1, 'center')
  y += 20

  // entries list
  const rowH = 72
  for (let i = 0; i < unlockedEntries.length; i++) {
    const entry = unlockedEntries[i]
    if (y + rowH > CONTENT_Y && y < H - 20) {
      // row bg
      ctx.fillStyle = p.panel + 'cc'
      roundRect(8, y+2, W-16, rowH-6, 5); ctx.fill()
      ctx.strokeStyle = p.border + '66'
      ctx.lineWidth = 1
      roundRect(8, y+2, W-16, rowH-6, 5); ctx.stroke()

      // gold left accent bar
      ctx.fillStyle = '#ffe066' + '88'
      ctx.fillRect(8, y+2, 3, rowH-6)

      // title
      drawText(entry.title, 22, y+12, p.cream, 1)
      drawText(entry.subtitle, 22, y+24, '#ffe066', 1)

      // page count
      drawText(entry.pages.length + (entry.pages.length===1?' page':' pages'), W-80, y+12, p.creamGhost, 1)

      // preview — first ~40 chars of first page
      const preview = entry.pages[0].slice(0,42) + (entry.pages[0].length>42?'...':'')
      const previewLines = wrapText(preview, 44)
      for (let li=0;li<Math.min(previewLines.length,2);li++) {
        drawText(previewLines[li], 22, y+38+li*12, p.creamGhost, 1)
      }
      drawText('tap to read', W-70, y+52, p.creamGhost+'99', 1)
    }
    y += rowH
  }

  // locked count teaser
  if (lockedCount > 0) {
    y += 8
    if (y > CONTENT_Y && y < H-20) {
      ctx.fillStyle = p.panel + '88'
      roundRect(8, y+2, W-16, 40, 5); ctx.fill()
      ctx.strokeStyle = p.border + '33'; ctx.lineWidth=1
      roundRect(8, y+2, W-16, 40, 5); ctx.stroke()
      drawText(lockedCount + ' more entr' + (lockedCount===1?'y':'ies') + ' waiting', W/2, y+10, p.creamGhost, 1, 'center')
      drawText('Keep serving covers.', W/2, y+24, p.creamGhost + '88', 1, 'center')
    }
    y += 48
  }

  // stars section
  y += 16
  if (y > CONTENT_Y && y < H-20) {
    // divider
    ctx.fillStyle = p.border + '44'; ctx.fillRect(16, y, W-32, 1)
    y += 12
    drawText('* STARS  ' + S.stars + ' available', 16, y, '#ffe066', 1)
    y += 18
    drawText('Permanent upgrades. Survive prestige.', 16, y, p.creamGhost, 1)
    y += 20
  }

  const starAvailable = STAR_UPGRADES.filter(u=>!S.starUpgrades.has(u.id))
  const starBought = STAR_UPGRADES.filter(u=>S.starUpgrades.has(u.id))
  const starRowH = 64

  for (const su of starAvailable) {
    if (y + starRowH > CONTENT_Y && y < H-20) {
      const canAfford = S.stars >= su.cost
      ctx.fillStyle = canAfford ? p.panelBright+'cc' : p.panel+'88'
      roundRect(8, y+2, W-16, starRowH-6, 5); ctx.fill()
      ctx.strokeStyle = canAfford ? '#ffe066'+'66' : p.border+'44'; ctx.lineWidth=1
      roundRect(8, y+2, W-16, starRowH-6, 5); ctx.stroke()

      // star cost badge
      const costStr = '* '+su.cost
      const cw = textWidth(costStr,1)+12
      ctx.fillStyle = canAfford ? '#ffe066'+'33' : p.espresso
      roundRect(W-cw-12, y+10, cw, 14, 3); ctx.fill()
      drawText(costStr, W-cw/2-12, y+14, canAfford?'#ffe066':p.creamGhost, 1, 'center')

      drawText(su.name, 16, y+10, canAfford?p.cream:p.creamDim, 1)
      drawText(su.desc, 16, y+24, '#ffe066', 1)
      drawText(su.flavor, 16, y+38, p.creamGhost, 1)
    }
    y += starRowH
  }

  for (const su of starBought) {
    if (y + starRowH > CONTENT_Y && y < H-20) {
      ctx.globalAlpha = 0.4
      ctx.fillStyle = p.panel+'88'
      roundRect(8, y+2, W-16, starRowH-6, 5); ctx.fill()
      ctx.globalAlpha = 1
      drawText(su.name, 16, y+10, p.creamGhost, 1)
      drawText('INSTALLED', W-70, y+10, p.creamGhost, 1)
      drawText(su.desc, 16, y+24, p.creamGhost, 1)
    }
    y += starRowH
  }
}

function drawLedgerReading(p, entry) {
  // full-screen atmospheric reading view
  const page = entry.pages[S.ledgerPage]
  const isLast = S.ledgerPage >= entry.pages.length - 1

  // dark overlay bg with vignette
  ctx.fillStyle = '#0d0905'
  ctx.fillRect(0, 0, W, H)

  // vignette
  const vig = ctx.createRadialGradient(W/2, H/2, 80, W/2, H/2, 320)
  vig.addColorStop(0, 'rgba(0,0,0,0)')
  vig.addColorStop(1, 'rgba(0,0,0,0.7)')
  ctx.fillStyle = vig; ctx.fillRect(0,0,W,H)

  // decorative top rule
  ctx.fillStyle = '#ffe066' + '44'; ctx.fillRect(24, 52, W-48, 1)
  ctx.fillStyle = '#ffe066' + '22'; ctx.fillRect(24, 56, W-48, 1)

  // entry title
  drawText(entry.title.toUpperCase(), W/2, 28, '#ffe066', 1, 'center')
  drawText(entry.subtitle, W/2, 42, p.creamGhost, 1, 'center')

  // decorative bottom rule
  ctx.fillStyle = '#ffe066' + '44'; ctx.fillRect(24, H-52, W-48, 1)

  // page body — wrap and render with generous line spacing
  const bodyLines = wrapText(page, 36)
  const lineH = 16
  const totalTextH = bodyLines.length * lineH
  let textY = H/2 - totalTextH/2 + 10
  if (textY < 80) textY = 80

  for (let i=0; i<bodyLines.length; i++) {
    const alpha = Math.min(1, (textY + i*lineH - 70) / 30)
    ctx.save()
    ctx.globalAlpha = Math.max(0, alpha)
    drawText(bodyLines[i], W/2, textY + i*lineH, p.cream, 1, 'center')
    ctx.restore()
  }

  // page indicator dots
  const dotY = H - 44
  const totalDots = entry.pages.length
  const dotSpacing = 12
  const dotsStartX = W/2 - (totalDots-1)*dotSpacing/2
  for (let i=0; i<totalDots; i++) {
    ctx.fillStyle = i===S.ledgerPage ? '#ffe066' : p.border
    ctx.beginPath(); ctx.arc(dotsStartX+i*dotSpacing, dotY, i===S.ledgerPage?3:2, 0, Math.PI*2); ctx.fill()
  }

  // nav hints
  if (S.ledgerPage > 0) {
    drawText('< back', 20, H-30, p.creamGhost, 1)
  }
  drawText(isLast ? 'close >' : 'next >', W-60, H-30, p.creamGhost, 1)
}

function drawSteamLayer() {
  for (const st of S.steam) {
    ctx.save(); ctx.globalAlpha=st.alpha
    ctx.fillStyle=`rgba(245,230,200,${st.alpha})`
    ctx.beginPath(); ctx.arc(st.x,st.y,st.r,0,Math.PI*2); ctx.fill()
    ctx.restore()
  }
}

function drawParticles() {
  for (const p of S.particles) {
    ctx.save(); ctx.globalAlpha=p.life/50
    ctx.fillStyle=p.color; ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size)
    ctx.restore()
  }
}

function drawToasts() {
  for (const t of S.toasts) {
    ctx.save(); ctx.globalAlpha=Math.min(1,t.life/15)
    drawText(t.text,t.x,t.y,t.color,t.scale,'center'); ctx.restore()
  }
}

function drawNotif(p) {
  const alpha=Math.min(1,S.notifLife/20)
  ctx.save(); ctx.globalAlpha=alpha
  ctx.fillStyle=p.panel+'ee'; roundRect(12,H-52,W-24,20,4); ctx.fill()
  ctx.strokeStyle=p.border; ctx.lineWidth=1; roundRect(12,H-52,W-24,20,4); ctx.stroke()
  drawText(S.notif, W/2, H-48, p.creamDim, 1, 'center')
  ctx.restore()
}

function drawRegularPopup(p) {
  const r=S.newRegular, alpha=Math.min(1,S.newRegularLife/30)
  ctx.save(); ctx.globalAlpha=alpha
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H)
  const pw=W-48,ph=200,px=24,py=H/2-ph/2
  ctx.fillStyle=p.panelBright; roundRect(px,py,pw,ph,8); ctx.fill()
  ctx.strokeStyle=p.gold; ctx.lineWidth=2; roundRect(px,py,pw,ph,8); ctx.stroke()
  ctx.fillStyle=p.gold+'44'; roundRect(px,py,pw,32,8); ctx.fill()
  ctx.fillRect(px,py+16,pw,16)
  drawText('A REGULAR ARRIVES', W/2, py+10, p.gold, 1, 'center')
  drawPixelFace(W/2, py+72, p.gold)
  drawText(r.name, W/2, py+100, p.cream, 2, 'center')
  drawText(r.title, W/2, py+116, p.creamDim, 1, 'center')
  const sl=wrapText(r.story,40)
  for (let i=0;i<Math.min(2,sl.length);i++) drawText(sl[i], W/2, py+132+i*13, p.creamGhost, 1, 'center')
  drawText('BONUS: '+r.bonusDesc, W/2, py+164, p.amber, 1, 'center')
  drawText('tap to continue', W/2, py+184, p.creamGhost, 1, 'center')
  ctx.restore()
}

function drawOfflineScreen(p) {
  // atmospheric "you were away" screen
  ctx.fillStyle = 'rgba(0,0,0,0.88)'
  ctx.fillRect(0,0,W,H)

  const vig = ctx.createRadialGradient(W/2, H/2, 60, W/2, H/2, 320)
  vig.addColorStop(0,'rgba(26,15,8,0)'); vig.addColorStop(1,'rgba(0,0,0,0.5)')
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H)

  // steam drifting up — static for the screen
  ctx.save()
  ctx.globalAlpha=0.12
  for (let i=0;i<5;i++) {
    ctx.fillStyle='#f5e6c8'
    ctx.beginPath()
    ctx.arc(W/2 - 30 + i*15, H/2 - 80 - i*20, 8+i*4, 0, Math.PI*2)
    ctx.fill()
  }
  ctx.restore()

  // decorative lines
  ctx.fillStyle = p.border + '66'; ctx.fillRect(32, H/2-90, W-64, 1)
  ctx.fillStyle = p.border + '66'; ctx.fillRect(32, H/2+80, W-64, 1)

  drawText('THE CAFE RAN', W/2, H/2-80, p.creamGhost, 1, 'center')
  drawText('WITHOUT YOU.', W/2, H/2-64, p.creamGhost, 1, 'center')

  // big number
  drawText(formatNum(S.offlineEarned), W/2, H/2-32, p.cream, 3, 'center')
  drawText('COVERS', W/2, H/2+2, p.creamDim, 1, 'center')
  drawText('earned while away', W/2, H/2+18, p.creamGhost, 1, 'center')

  // efficiency note
  drawText('(50% efficiency — the staff manage.)', W/2, H/2+44, p.creamGhost+'88', 1, 'center')

  // cps at save
  drawText('tap anywhere to continue', W/2, H/2+74, p.gold, 1, 'center')

  // small espresso sprite
  ctx.save()
  ctx.translate(0,-20)
  drawStation('espresso', W/2, H/2+130, 0)
  ctx.restore()
}

function drawDevScreen(p) {
  ctx.save()
  ctx.fillStyle='rgba(0,0,0,0.82)'; ctx.fillRect(0,0,W,H)
  const pw=W-60,ph=260,px=30,py=H/2-ph/2
  ctx.fillStyle=p.panel; roundRect(px,py,pw,ph,10); ctx.fill()
  ctx.strokeStyle='#ff4444'; ctx.lineWidth=2; roundRect(px,py,pw,ph,10); ctx.stroke()
  drawText('DEV MODE', W/2, py+14, '#ff4444', 1, 'center')
  drawText('cheat in covers', W/2, py+28, p.creamGhost, 1, 'center')

  const btns=[
    {label:'+1K',    amt:1000},
    {label:'+10K',   amt:10000},
    {label:'+100K',  amt:100000},
    {label:'+1M',    amt:1000000},
    {label:'+10M',   amt:10000000},
    {label:'+100M',  amt:100000000},
  ]
  const bw=90, bh=30, gap=10
  const cols=2, rows=Math.ceil(btns.length/cols)
  const gridW=cols*bw+(cols-1)*gap
  const gx=W/2-gridW/2
  for (let i=0;i<btns.length;i++) {
    const col=i%cols, row=Math.floor(i/cols)
    const bx=gx+col*(bw+gap), by=py+50+row*(bh+gap)
    ctx.fillStyle='#ff444422'; roundRect(bx,by,bw,bh,5); ctx.fill()
    ctx.strokeStyle='#ff4444'; ctx.lineWidth=1; roundRect(bx,by,bw,bh,5); ctx.stroke()
    drawText(btns[i].label, bx+bw/2, by+bh/2-3, '#ff8888', 1, 'center')
  }
  drawText('tap outside to close', W/2, py+ph-16, p.creamGhost, 1, 'center')
  ctx.restore()
}

function drawPrestigeConfirm(p) {
  ctx.save()
  ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H)
  const nextEra=ERAS[Math.min(S.prestige+1,ERAS.length-1)]
  const pw=W-40,ph=220,px=20,py=H/2-ph/2-20
  ctx.fillStyle=p.panel; roundRect(px,py,pw,ph,10); ctx.fill()
  ctx.strokeStyle=p.gold; ctx.lineWidth=2; roundRect(px,py,pw,ph,10); ctx.stroke()
  drawText('CLOSE FOR THE SEASON', W/2, py+14, p.gold, 1, 'center')
  drawText('All covers and stations reset.', W/2, py+34, p.cream, 1, 'center')
  drawText('Your regulars remember you.', W/2, py+48, p.creamDim, 1, 'center')
  drawText('NEW ERA:', W/2, py+72, p.creamGhost, 1, 'center')
  drawText(nextEra.name, W/2, py+88, p.cream, 2, 'center')
  drawText(nextEra.subtitle, W/2, py+106, p.creamDim, 1, 'center')
  drawText('Prestige bonus: x'+(1+(S.prestige+1)*0.5).toFixed(1)+' global', W/2, py+126, p.amber, 1, 'center')
  const cx2=W/2
  ctx.fillStyle=p.gold+'33'; roundRect(cx2-60,py+148,120,32,6); ctx.fill()
  ctx.strokeStyle=p.gold; ctx.lineWidth=1.5; roundRect(cx2-60,py+148,120,32,6); ctx.stroke()
  drawText('CLOSE UP SHOP', cx2, py+158, p.gold, 1, 'center')
  drawText('(confirm)', cx2, py+170, p.creamGhost, 1, 'center')
  drawText('tap outside to cancel', W/2, py+200, p.creamGhost, 1, 'center')
  ctx.restore()
}

// ─── Input ────────────────────────────────────────────────────────────────────
function handleTap(cx,cy) {
  if (S.showMarcus) { S.showMarcus=false; return }
  if (S.showOfflineScreen) { S.showOfflineScreen=false; return }
  if (S.showDevScreen) {
    // check button hits inside dev screen
    const pw=W-60,ph=260,px=30,py=H/2-ph/2
    const inside=cx>=px&&cx<=px+pw&&cy>=py&&cy<=py+ph
    if (inside) {
      const btns=[1000,10000,100000,1000000,10000000,100000000]
      const bw=90,bh=30,gap=10,cols=2
      const gridW=cols*bw+(cols-1)*gap
      const gx=W/2-gridW/2
      for (let i=0;i<btns.length;i++) {
        const col=i%cols,row=Math.floor(i/cols)
        const bx=gx+col*(bw+gap),by=py+50+row*(bh+gap)
        if (cx>=bx&&cx<=bx+bw&&cy>=by&&cy<=by+bh) {
          S.covers+=btns[i]; S.totalCovers+=btns[i]
          checkUnlocks()
          addToast('+'+formatNum(btns[i]),W/2,H/2,P.gold,2)
          spawnParticles(W/2,H/2,P.gold,12)
        }
      }
    } else {
      S.showDevScreen=false
    }
    return
  }

  if (S.prestigeConfirm) {
    const ph=220, py=H/2-ph/2-20
    const btnY=py+148, btnY2=btnY+32
    const mid=W/2
    if (cx>=mid-60&&cx<=mid+60&&cy>=btnY&&cy<=btnY2) {
      const next=S.prestige+1
      const keptStars=S.stars; const keptTotalStars=S.totalStars
      const keptStarUpgrades=S.starUpgrades; const keptLedger=S.ledgerUnlocked
      S.covers=0; S.totalCovers=0; S.owned={}; S.upgrades=new Set()
      S.prestige=next; S.era=Math.min(next,ERAS.length-1)
      S.stars=keptStars+3; S.totalStars=keptTotalStars+3
      S.starUpgrades=keptStarUpgrades; S.ledgerUnlocked=keptLedger
      S.prestigeConfirm=false
      checkLedger()
      setNotif(ERAS[S.era].name+' — a new era begins (+3 stars)')
      spawnParticles(W/2,H/2,P.gold,30)
    } else {
      S.prestigeConfirm=false
    }
    return
  }
  if (S.newRegular&&S.newRegularLife>0) { S.newRegular=null; S.newRegularLife=0; return }

  if (cy>=HEADER_H&&cy<=HEADER_H+TAB_H) {
    const tabs=['stations','upgrades','regulars','ledger']
    const tabW=W/tabs.length, idx=Math.floor(cx/tabW)
    if (tabs[idx]) { S.tab=tabs[idx]; S.scrollY=0; S.scrollTarget=0 }
    return
  }

  if (cy<HEADER_H) {
    if (cx>=90&&cx<=200&&cy>=20&&cy<=110) {
      const bonus=clickBonus()
      S.covers+=bonus; S.totalCovers+=bonus; S.clickAnim=10
      spawnParticles(150,80,P.gold,4)
      addToast('+'+bonus, 150, 60, P.gold, 1)
      for (let i=0;i<3;i++) S.steam.push({x:140+Math.random()*20,y:35,vy:-(0.5+Math.random()),life:40+Math.random()*20,alpha:0.4,r:3+Math.random()*3})
      checkUnlocks()
    }
    if (cx>=W-70&&cx<=W-8&&cy>=8&&cy<=30) {
      if (S.totalCovers>=prestigeThreshold(S.prestige)) S.prestigeConfirm=true
      else setNotif('Need '+formatNum(prestigeThreshold(S.prestige))+' total covers')
    }
    // refresh button
    if (cx>=W-52&&cx<=W-30&&cy>=108&&cy<=123) { saveGame(); location.reload(); return }
    // dev button
    if (cx>=W-26&&cx<=W-6&&cy>=108&&cy<=123) { S.showDevScreen=true; return }
    return
  }

  if (cy<CONTENT_Y||cy>H-20) return
  const relY=cy-CONTENT_Y+S.scrollY

  if (S.tab==='stations') {
    const rowH=86, idx=Math.floor(relY/rowH)
    const def=STATIONS[idx]; if (!def) return
    if (S.totalCovers<def.unlockAt) return
    if (def.id==='marcus' && (S.owned['marcus']??0)>0) { S.showMarcus=true; return }
    const cost=stationCost(def,S.owned[def.id]??0)
    if (S.covers>=cost) {
      S.covers-=cost; S.owned[def.id]=(S.owned[def.id]??0)+1
      spawnParticles(W/2, CONTENT_Y+idx*rowH-S.scrollY+40, P.amber, 8)
      addToast('+1 '+def.name, W/2, CONTENT_Y+idx*rowH-S.scrollY+20, P.amber)
      checkUnlocks(); setNotif(def.flavor)
    }
  }

  if (S.tab==='upgrades') {
    const available=UPGRADES.filter(u=>!S.upgrades.has(u.id)&&(S.owned[u.stationId]??0)>=u.unlockOwned)
    const rowH=72, idx=Math.floor(relY/rowH)
    const u=available[idx]; if (!u) return
    if (S.covers>=u.cost) {
      S.covers-=u.cost; S.upgrades.add(u.id)
      spawnParticles(W/2, CONTENT_Y+idx*rowH-S.scrollY+30, P.gold, 10)
      addToast(u.name, W/2, CONTENT_Y+idx*rowH-S.scrollY+10, P.gold)
      setNotif(u.name+': '+u.desc)
    }
  }

  if (S.tab==='ledger') {
    // if reading an entry, handle page turn / close
    if (S.ledgerReading !== null) {
      const now = performance.now()
      if (now - (S.ledgerLastTap ?? 0) < 600) return  // debounce: ignore taps within 600ms
      S.ledgerLastTap = now
      const entry = LEDGER[S.ledgerReading]
      if (cx <= 80 && cy >= H-60) {
        // back — left side bottom
        if (S.ledgerPage > 0) S.ledgerPage--
        else S.ledgerReading = null
      } else {
        // anywhere else = forward
        if (S.ledgerPage < entry.pages.length-1) S.ledgerPage++
        else S.ledgerReading = null
      }
      return
    }

    // star upgrade section at bottom — check if tap is in star section
    const unlockedEntries = LEDGER.filter(e=>S.ledgerUnlocked.has(e.id))
    const entryRowH = 72
    const entriesHeight = unlockedEntries.length * entryRowH + 16
    const starSectionY = entriesHeight + 24

    if (relY >= starSectionY) {
      // tapped in star upgrades
      const starRelY = relY - starSectionY - 24
      const starRowH = 64
      const idx = Math.floor(starRelY / starRowH)
      const available = STAR_UPGRADES.filter(u=>!S.starUpgrades.has(u.id))
      const su = available[idx]
      if (su && S.stars >= su.cost) {
        S.stars -= su.cost
        S.starUpgrades.add(su.id)
        spawnParticles(W/2, CONTENT_Y+100, '#ffe066', 14)
        addToast(su.name, W/2, CONTENT_Y+80, '#ffe066', 1)
        setNotif(su.name+': '+su.desc)
      }
      return
    }

    // tapped a ledger entry
    const idx = Math.floor((relY-16) / entryRowH)
    if (idx >= 0 && idx < unlockedEntries.length) {
      const globalIdx = LEDGER.findIndex(e=>e.id===unlockedEntries[idx].id)
      S.ledgerReading = globalIdx
      S.ledgerPage = 0
    }
  }
}

let lastTouchY=0, touchStartY=0, isTap=true

canvas.addEventListener('touchstart', e=>{
  lastTouchY=e.touches[0].clientY; touchStartY=lastTouchY; isTap=true
}, {passive:true})

canvas.addEventListener('touchmove', e=>{
  e.preventDefault()
  const dy=e.touches[0].clientY-lastTouchY
  if (Math.abs(e.touches[0].clientY-touchStartY)>8) isTap=false
  const rect=canvas.getBoundingClientRect()
  const ratio=canvas.clientHeight>0?H/canvas.clientHeight:1
  const cy=(e.touches[0].clientY-rect.top)*ratio
  if (cy>CONTENT_Y&&cy<H-20) S.scrollTarget=Math.max(0,S.scrollTarget-dy*ratio)
  lastTouchY=e.touches[0].clientY
}, {passive:false})

canvas.addEventListener('touchend', e=>{
  if (!isTap) return
  const rect=canvas.getBoundingClientRect()
  const ratio=canvas.clientHeight>0?H/canvas.clientHeight:1
  const t=e.changedTouches[0]
  handleTap((t.clientX-rect.left)*ratio, (t.clientY-rect.top)*ratio)
}, {passive:true})

canvas.addEventListener('click', e=>{
  const rect=canvas.getBoundingClientRect()
  const ratio=canvas.clientHeight>0?H/canvas.clientHeight:1
  handleTap((e.clientX-rect.left)*ratio, (e.clientY-rect.top)*ratio)
})

// ─── Game loop ────────────────────────────────────────────────────────────────
let saveTimer=0

function loop(now) {
  requestAnimationFrame(loop)
  const dt=Math.min((now-S.lastTick)/1000, 0.1)
  S.lastTick=now

  S.coversPerSec=calcCPS()
  const earned=S.coversPerSec*dt
  S.covers+=earned; S.totalCovers+=earned

  S.scrollY+=(S.scrollTarget-S.scrollY)*0.18
  if (S.clickAnim>0) S.clickAnim--
  if (S.notifLife>0) S.notifLife--
  if (S.newRegularLife>0) S.newRegularLife--

  S.steam=S.steam.filter(s=>s.life>0)
  for (const st of S.steam) {
    st.y+=st.vy; st.x+=(Math.random()-0.5)*0.5
    st.life--; st.alpha=(st.life/60)*0.4; st.r+=0.05
  }

  S.particles=S.particles.filter(p=>p.life>0)
  for (const p of S.particles) { p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-- }

  S.toasts=S.toasts.filter(t=>t.life>0)
  for (const t of S.toasts) { t.y-=0.5; t.life-- }

  checkUnlocks()

  saveTimer+=dt
  if (saveTimer>5) { saveTimer=0; saveGame() }

  draw(now)
}

// ─── Offline earnings ─────────────────────────────────────────────────────────
let hiddenAt = null

function awardOfflineEarnings(elapsedSec) {
  if (!S || elapsedSec < 5) return
  const cps = calcCPS()
  if (cps === 0) return
  const capped = Math.min(elapsedSec, 8 * 3600)
  const earned = Math.floor(cps * capped * 0.5)
  if (earned === 0) return
  S.covers += earned
  S.totalCovers += earned
  S.offlineEarned = earned
  S.showOfflineScreen = true
  checkUnlocks()
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    hiddenAt = Date.now()
    saveGame()
  } else {
    if (hiddenAt !== null) {
      const elapsed = (Date.now() - hiddenAt) / 1000
      hiddenAt = null
      // also advance lastTick so the game loop doesn't double-count
      if (S) S.lastTick = performance.now()
      awardOfflineEarnings(elapsed)
    }
  }
})

// ─── Boot ─────────────────────────────────────────────────────────────────────
const savedData = loadGame()

// fallback: handle earnings from a full app close via saved timestamp
let bootOfflineEarned = 0
if (savedData.savedAt && savedData.owned) {
  const elapsed = Math.min((Date.now() - savedData.savedAt) / 1000, 8 * 3600)
  if (elapsed >= 10) {
    const tempS = initState(savedData)
    const origS = S
    S = tempS
    const cps = calcCPS()
    S = origS
    bootOfflineEarned = Math.floor(cps * elapsed * 0.5)
    if (bootOfflineEarned > 0) {
      savedData.covers = (savedData.covers ?? 0) + bootOfflineEarned
      savedData.totalCovers = (savedData.totalCovers ?? 0) + bootOfflineEarned
    }
  }
}

S = initState(savedData)
S.offlineEarned = bootOfflineEarned
S.showOfflineScreen = bootOfflineEarned > 0
requestAnimationFrame(loop)
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
}
</script>
